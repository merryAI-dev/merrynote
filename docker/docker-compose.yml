version: "3.8"

services:
  # ── Kafka 인프라 ────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Kafka UI (학습 + 디버깅용) ─────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: merrynote-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Whisper + pyannote 화자분리 서비스 ──────────────
  whisper-diarize:
    build: ./whisper-diarize
    ports:
      - "8000:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      WHISPER_MODEL: ${WHISPER_MODEL:-medium}
      DEVICE: ${DEVICE:-cpu}
      COMPUTE_TYPE: ${COMPUTE_TYPE:-int8}
    restart: unless-stopped

  # ── Training Worker (Kafka → HF Dataset 동기화) ─────
  training-worker:
    build: ./training-worker
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      HF_TOKEN: ${HF_TOKEN}
      HF_DATASET_REPO: ${HF_DATASET_REPO:-boramintheMYSC/merrynote-training-data}
    restart: unless-stopped

  # ── Worker (Kafka Consumer → Qwen → Firestore) ─────
  worker:
    build: ./worker
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      OLLAMA_URL: http://host.docker.internal:11434
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
